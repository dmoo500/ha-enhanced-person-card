name: Release

on:
  push:
    tags:
      - "v*"

jobs:
  release:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Enable Corepack
        run: corepack enable

      - name: Install dependencies
        run: yarn install --immutable

      - name: Build
        run: yarn build

      - name: Get version from tag
        id: version
        run: echo "VERSION=${GITHUB_REF#refs/tags/v}" >> $GITHUB_OUTPUT

      - name: Create release archive
        run: |
          mkdir -p release
          cp enhanced-person-card.js release/
          cp README.md release/
          cp LICENSE release/
          cp hacs.json release/
          cp CHANGELOG.md release/
          cd release
          zip -r ../enhanced-person-card-${{ steps.version.outputs.VERSION }}.zip .

      - name: Generate changelog
        id: changelog
        run: |
          if [ -f CHANGELOG.md ]; then
            sed -n '/^## \[/,/^## \[/p' CHANGELOG.md | head -n -1 > current_changes.md
            echo "CHANGELOG<<EOF" >> $GITHUB_OUTPUT
            cat current_changes.md >> $GITHUB_OUTPUT
            echo "EOF" >> $GITHUB_OUTPUT
          else
            echo "CHANGELOG=Release ${{ steps.version.outputs.VERSION }}" >> $GITHUB_OUTPUT
          fi

      - name: Create GitHub Release
        uses: actions/create-release@v1
        id: create_release
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          tag_name: v${{ steps.version.outputs.VERSION }}
          release_name: Enhanced Person Card v${{ steps.version.outputs.VERSION }}
          body: |
            ## 🎉 Enhanced Person Card v${{ steps.version.outputs.VERSION }}

            ### 📦 Installation

            #### HACS (Recommended)
            1. Add this repository to HACS
            2. Search for "Enhanced Person Card"
            3. Install the latest version

            #### Manual
            1. Download `enhanced-person-card.js`
            2. Copy it to `config/www/`
            3. Add the resource to your dashboard

            ### 📋 Changelog
            ${{ steps.changelog.outputs.CHANGELOG }}

            ### 🔧 Compatibility
            - Home Assistant 2025.0+
            - Modern browsers (Chrome 90+, Firefox 88+, Safari 14+)

          draft: false
          prerelease: false

      - name: Upload release archive
        uses: actions/upload-release-asset@v1
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          upload_url: ${{ steps.create_release.outputs.upload_url }}
          asset_path: ./enhanced-person-card-${{ steps.version.outputs.VERSION }}.zip
          asset_name: enhanced-person-card-${{ steps.version.outputs.VERSION }}.zip
          asset_content_type: application/zip
        continue-on-error: true

      - name: Upload individual JS file
        uses: actions/upload-release-asset@v1
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          upload_url: ${{ steps.create_release.outputs.upload_url }}
          asset_path: ./enhanced-person-card.js
          asset_name: enhanced-person-card.js
          asset_content_type: application/javascript
        continue-on-error: true
